# Project-wide Gradle settings.

# Memory & GC tuning for faster compilation
# 4GB-6GB is typically optimal for React Native projects
org.gradle.jvmargs = -Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC -Dfile.encoding=UTF-8

# Build performance features
org.gradle.parallel = true
org.gradle.caching = true
org.gradle.vfs.watch = true

# Configuration Cache (Major speed boost for subsequent builds)
org.gradle.configuration-cache = true
org.gradle.configuration-cache.problems = warn

# Better for multi-project reliability with Config Cache
org.gradle.configureondemand = false

# Android / AndroidX
android.useAndroidX = true
android.enableJetifier = false
android.nonTransitiveRClass = true
android.enablePngCrunchInReleaseBuilds = true

# Kotlin
kotlin.code.style = official
kotlin.incremental = true

# React Native & New Architecture
# Reduced architectures for faster dev builds (add armeabi-v7a for production)
reactNativeArchitectures = arm64-v8a,x86_64
newArchEnabled = true
hermesEnabled = true

# UI / Display
edgeToEdgeEnabled = true
# Deprecated in SDK 55, keep for SDK 54 compatibility
expo.edgeToEdgeEnabled = true

# Expo Specifics
expo.gif.enabled = true
expo.webp.enabled = true
expo.webp.animated = false
expo.useLegacyPackaging = false

# Debugging
EX_DEV_CLIENT_NETWORK_INSPECTOR = true
