properties=
# Project-wide Gradle settings.
# Increased memory for faster compilation
org.gradle.jvmargs=-Xmx8192m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
# Configuration Cache (Major speed boost)
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn
# Better for multi-project reliability
org.gradle.configureondemand=false
# Android/AndroidX
android.useAndroidX=true
android.enableJetifier=false
android.nonTransitiveRClass=true
# Kotlin
kotlin.code.style=official
# React Native
# Reduced architectures for faster dev builds (add armeabi-v7a back for production/older devices)
reactNativeArchitectures=arm64-v8a,x86_64
newArchEnabled=true
hermesEnabled=true
# UI/Display
edgeToEdgeEnabled=true
# REMOVE THIS in SDK 55
expo.edgeToEdgeEnabled=true 
# Expo Specifics
expo.gif.enabled=true
expo.webp.enabled=true
expo.webp.animated=false
expo.useLegacyPackaging=false
# Debugging
EX_DEV_CLIENT_NETWORK_INSPECTOR=true