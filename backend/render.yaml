services:
  - type: web
    name: mitralink-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        fromContext: git
      - key: GROQ_API_KEY
        fromContext: git
      - key: GEMINI_API_KEY
        fromContext: git
      - key: DATABASE_PATH
        value: /app/data/database.sqlite
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
